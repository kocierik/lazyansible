# Example Ansible inventory
# Copy to inventory.ini at your project root

[webservers]
web1.example.com ansible_user=ubuntu
web2.example.com ansible_user=ubuntu

[dbservers]
db1.example.com  ansible_user=postgres ansible_port=5432
db2.example.com  ansible_user=postgres ansible_port=5432

[monitoring]
metrics.example.com

[webservers:vars]
http_port=80
https_port=443

[dbservers:vars]
db_port=5432

[production:children]
webservers
dbservers
monitoring
