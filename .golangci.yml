linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  govet:
    enable-all: false

issues:
  exclude-rules:
    # Ignore errors on deferred Close() calls — common in TUI code.
    - linters: [errcheck]
      text: "Error return value of .*(Close|Flush|Write).*"
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
