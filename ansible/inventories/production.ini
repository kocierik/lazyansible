# Production inventory

[webservers]
web1.prod.local ansible_host=192.168.1.10 ansible_user=ubuntu
web2.prod.local ansible_host=192.168.1.11 ansible_user=ubuntu
web3.prod.local ansible_host=192.168.1.12 ansible_user=ubuntu

[dbservers]
db1.prod.local ansible_host=192.168.1.20 ansible_user=ubuntu
db2.prod.local ansible_host=192.168.1.21 ansible_user=ubuntu

[monitoring]
metrics.prod.local ansible_host=192.168.1.30 ansible_user=ubuntu

[loadbalancers]
lb1.prod.local ansible_host=192.168.1.5 ansible_user=ubuntu

[webservers:vars]
http_port=80
https_port=443
app_env=production

[dbservers:vars]
db_port=5432
db_name=appdb

[production:children]
webservers
dbservers
monitoring
loadbalancers
