all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    app_env: staging
  children:
    webservers:
      hosts:
        web1.staging.local:
          ansible_host: 10.0.1.10
          ansible_user: ubuntu
          http_port: 8080
        web2.staging.local:
          ansible_host: 10.0.1.11
          ansible_user: ubuntu
          http_port: 8080
      vars:
        nginx_version: "1.24"
    dbservers:
      hosts:
        db1.staging.local:
          ansible_host: 10.0.1.20
          ansible_user: ubuntu
          db_port: 5432
      vars:
        db_name: appdb_staging
    monitoring:
      hosts:
        metrics.staging.local:
          ansible_host: 10.0.1.30
          ansible_user: ubuntu
