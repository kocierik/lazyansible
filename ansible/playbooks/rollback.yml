---
# Rollback to previous application version
- name: Rollback application deployment
  hosts: webservers
  become: true
  vars:
    deploy_path: /var/www/app
    backup_path: /var/www/app.backup

  tasks:
    - name: Check backup exists
      ansible.builtin.stat:
        path: "{{ backup_path }}"
      register: backup_stat
      failed_when: not backup_stat.stat.exists

    - name: Stop application service
      ansible.builtin.systemd:
        name: app
        state: stopped

    - name: Swap current with backup
      ansible.builtin.command: >
        mv {{ deploy_path }} {{ deploy_path }}.failed &&
        mv {{ backup_path }} {{ deploy_path }}

    - name: Start application service
      ansible.builtin.systemd:
        name: app
        state: started

    - name: Verify rollback succeeded
      ansible.builtin.uri:
        url: "http://localhost:{{ http_port }}/health"
        status_code: 200
      retries: 5
      delay: 3
