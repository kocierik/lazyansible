---
# Local test playbook – runs entirely on localhost, no SSH needed.
# Use this to verify lazyansible's live streaming and status tracking.
#
#   ansible-playbook playbooks/local-test.yml -i inventories/local.ini

- name: Local test run
  hosts: localhost
  connection: local
  gather_facts: true
  become: false   # never escalate on localhost – avoids sudo password prompt

  vars:
    test_dir: /tmp/lazyansible-test

  tasks:
    - name: Create test directory
      ansible.builtin.file:
        path: "{{ test_dir }}"
        state: directory
        mode: "0755"

    - name: Write a file (changed on first run)
      ansible.builtin.copy:
        content: "lazyansible test – {{ ansible_facts['date_time']['iso8601'] }}\n"
        dest: "{{ test_dir }}/hello.txt"

    - name: Stat the file (always ok)
      ansible.builtin.stat:
        path: "{{ test_dir }}/hello.txt"
      register: stat_result

    - name: Show file info
      ansible.builtin.debug:
        msg: "File size: {{ stat_result.stat.size }} bytes"

    - name: Simulate a slow task
      ansible.builtin.command: sleep 1
      changed_when: false

    - name: Simulate another slow task
      ansible.builtin.command: sleep 1
      changed_when: false

    - name: Echo environment
      ansible.builtin.debug:
        msg: "Running on {{ ansible_facts['hostname'] }} ({{ ansible_facts['os_family'] }})"

    - name: Clean up test directory
      ansible.builtin.file:
        path: "{{ test_dir }}"
        state: absent
